let current=0,answers=new Array(questions.length).fill(null),mode='quiz';

function render(){
  const el=document.getElementById('main');
  if(mode==='score'){renderScore(el);return;}
  if(mode==='review'){renderReview(el);return;}
  renderQuestion(el);
}

function renderQuestion(el){
  const q=questions[current];
  const answered=answers[current]!==null;
  const pct=Math.round(((current+1)/questions.length)*100);
  let optsHtml=q.o.map((opt,i)=>{
    let cls='opt-btn',dis='';
    if(answered){
      dis='disabled';
      if(i===q.a)cls+=' correct';
      else if(i===answers[current]&&answers[current]!==q.a)cls+=' wrong';
    }
    return `<button class="${cls}" ${dis} onclick="choose(${i})">${opt}</button>`;
  }).join('');
  let feedback='';
  if(answered){
    if(answers[current]===q.a){
      feedback=`<div class="feedback correct">✓ إجابة صحيحة!</div>`;
    } else {
      feedback=`<div class="feedback wrong">✗ خطأ — الإجابة الصحيحة: ${q.o[q.a]}</div>`;
    }
  }
  el.innerHTML=`
    <div class="progress-wrap">
      <div class="q-counter"><span>سؤال ${current+1} من ${questions.length}</span><span>${pct}%</span></div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="q-card">
      <span class="section-badge">${q.s}</span>
      <div class="q-text">${q.q}</div>
      <div class="options">${optsHtml}</div>
      ${feedback}
    </div>
    <div class="nav">
      ${current>0?`<button onclick="go(-1)">← السابق</button>`:''}
      ${current<questions.length-1?`<button class="primary" onclick="go(1)">التالي →</button>`:`<button class="primary" onclick="finish()">إنهاء الامتحان ✓</button>`}
    </div>`;
  window.scrollTo(0,0);
}

function renderScore(el){
  const total=questions.length;
  const correct=answers.filter((a,i)=>a===questions[i].a).length;
  const wrong=answers.filter((a,i)=>a!==null&&a!==questions[i].a).length;
  const skipped=answers.filter(a=>a===null).length;
  const pct=Math.round((correct/total)*100);
  const grade=pct>=90?'ممتاز 🏆':pct>=80?'جيد جداً 🌟':pct>=70?'جيد 👍':pct>=60?'مقبول 📝':'يحتاج مراجعة 📚';
  const gc=pct>=70?'#EAF3DE':'#FCEBEB',gtc=pct>=70?'#27500A':'#501313';
  el.innerHTML=`
    <div class="score-card">
      <div class="score-big">${correct}/${total}</div>
      <div class="score-label">${pct}%</div>
      <div class="grade-badge" style="background:${gc};color:${gtc}">${grade}</div>
      <div class="score-breakdown">
        <div class="stat-box cs"><div class="stat-num">${correct}</div><div class="stat-lbl">صحيح ✓</div></div>
        <div class="stat-box ws"><div class="stat-num">${wrong}</div><div class="stat-lbl">خطأ ✗</div></div>
        <div class="stat-box ss"><div class="stat-num">${skipped}</div><div class="stat-lbl">لم يُجب</div></div>
      </div>
      <br>
      <button class="btn-review" onclick="startReview()">مراجعة الإجابات</button><br>
      <button class="btn-restart" onclick="restart()">إعادة الامتحان</button>
    </div>`;
}

function renderReview(el){
  let html=`<div class="review-header"><button class="btn-restart" onclick="restart()">إعادة الامتحان</button><span class="review-title">مراجعة جميع الإجابات</span></div>`;
  let lastSection='';
  questions.forEach((q,i)=>{
    const ua=answers[i],isC=ua===q.a,isS=ua===null;
    if(q.s!==lastSection){
      if(lastSection)html+=`<hr class="section-sep">`;
      html+=`<div style="margin:1rem 0 0.5rem"><span class="section-badge">${q.s}</span></div>`;
      lastSection=q.s;
    }
    const cb=isC?'border-color:#639922':isS?'':'border-color:#A32D2D';
    html+=`<div class="q-card" style="${cb}"><div class="q-text">${q.q}</div><div class="options">`;
    q.o.forEach((opt,oi)=>{
      let cls='opt-btn';
      if(oi===q.a)cls+=' correct';
      else if(oi===ua&&!isC)cls+=' wrong';
      html+=`<button class="${cls}" disabled>${opt}</button>`;
    });
    html+='</div>';
    if(isS)html+=`<div class="skipped-note">لم تُجب على هذا السؤال</div>`;
    html+='</div>';
  });
  el.innerHTML=html;
}

function choose(i){if(answers[current]!==null)return;answers[current]=i;render();}
function go(dir){current=Math.max(0,Math.min(questions.length-1,current+dir));render();}
function finish(){mode='score';render();}
function startReview(){mode='review';render();}
function restart(){current=0;answers=new Array(questions.length).fill(null);mode='quiz';render();}

render();
</script>
